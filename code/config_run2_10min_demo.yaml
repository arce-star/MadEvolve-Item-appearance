# ============================================================
# MadEvolve Config — Run 2: Evolving Order Placement (set_limit_order)
# ============================================================

# 任务描述 (会注入 LLM prompt)
task_description: |
  You are optimizing a passive limit-order execution strategy for BTC trading.
  The strategy uses a fixed alpha forecaster (Ridge regression over EMA features)
  and a two-stage pipeline: set_target() converts alpha to a desired position,
  set_limit_order() places a single limit order to move toward that target.

  The set_limit_order() function receives the target decision and market state.
  The limit price follows plimit = m * exp(-s * d) where s=+1 for buy, s=-1 for sell.

  PnL is computed as impact-adjusted PnL on a minute-bar backtest:
  PnL_adj = q * delta_mid - spread_cost - 15bps_fee - market_impact
  where market impact uses a square-root model with temporal decay.

  All tunable parameters MUST be declared as UPPER_CASE module-level constants
  at the top of the EVOLVE-BLOCK. Maximum 15 tunable parameters.

# 评估器脚本 (MadEvolve 会调用此脚本评估每个候选策略)
evaluator_script: /root/autodl-tmp/量化复现/code/evaluator_quick.py

# 初始程序 (基线策略)
init_program_path: /root/autodl-tmp/量化复现/code/baseline_run2.py

# 进化参数
num_generations: 3    # 候选策略总数 (快速模式)
seed: 42

# LLM 模型配置 (双模型 ensemble)
# Flash: 小模型, 增量改进 (类比 Gemini Flash, 28% 改进率)
# Pro:   大模型, 结构创新 (类比 Claude Opus, 42% 改进率)
# UCB bandit 自动学习各模型在不同 patch mode 下的成功率
models:
  models:
    - deepseek-v4-flash
    - deepseek-v4-pro
  weights:
    - 0.75     # Flash 权重高, 负责高频增量探索
    - 0.25     # Pro 权重低, 偶尔做结构重写
  temperature: 0.7
  max_tokens: 8192
  adaptive_selection: true
  selection_algorithm: ucb
  exploration_factor: 1.0
  decay_rate: 0.99

# Population 配置
population:
  partition:
    enabled: true
    dimensions:
      - complexity
      - performance
    bins_per_dimension: 10
  islands:
    enabled: true
    num_islands: 2           # 快速模式: 2个岛屿
    island_capacity: 15
    migration_interval: 5
    migration_rate: 0.1
    topology: ring
  archive:
    enabled: true
    max_size: 30
    elite_count: 5
  selection_strategy: adaptive
  exploitation_ratio: 0.6

# Patch 策略
patch_policy:
  modes:
    - differential
    - holistic
  weights:
    - 0.7
    - 0.3
  adaptive: true
  stagnation_threshold: 10
  max_patch_retries: 3

# 执行器配置
executor:
  mode: local
  max_parallel_jobs: 2        # 并发评估数
  num_llm_threads: 2          # LLM producer 线程数
  timeout: 120                # 每次评估超时 (秒)

# 存储配置
storage:
  db_path: evolution.db
  checkpoint_interval: 10     # 每 10 个显示代保存检查点

# 报告配置
report:
  enabled: true
  output_dir: reports
  export_format: markdown
